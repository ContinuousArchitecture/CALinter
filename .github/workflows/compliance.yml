name: Reglas de Cumplimiento Globales

on:
  workflow_call:
    inputs:
      manifest_file:
        description: Ruta del manifiesto de validación relativa al checkout del repositorio de gobernanza.
        required: false
        type: string
        default: "rules/validation-manifest.yaml"
    outputs:
      status:
        description: Estado consolidado de validación.
        value: ${{ jobs.validate.outputs.status }}
      report:
        description: Informe consolidado de validación en formato JSON.
        value: ${{ jobs.validate.outputs.report }}

jobs:
  validate:
    name: Ejecutar reglas de validación
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      status: ${{ steps.validate.outputs.status }}
      report: ${{ steps.validate.outputs.report }}

    steps:
      - name: Obtener repositorio llamador
        uses: actions/checkout@v4

      - name: Obtener repositorio de gobernanza
        uses: actions/checkout@v4
        with:
          repository: fad3dc07-e43b-4db5-92bd-fbfecbc5ae1b/ci-architecture-governance
          path: governance

      - id: validate
        name: Ejecutar motor de validación
        shell: bash
        env:
          MANIFEST_FILE: ${{ inputs.manifest_file }}
        run: |
          report_file="$RUNNER_TEMP/governance-validation-report.json"
          status="$(node governance/engine.mjs --mode validate --repo-root "$GITHUB_WORKSPACE" --manifest "governance/$MANIFEST_FILE" --report-file "$report_file")"
          report="$(cat "$report_file")"
          printf 'status=%s\n' "$status" >> "$GITHUB_OUTPUT"
          printf 'report<<EOF\n%s\nEOF\n' "$report" >> "$GITHUB_OUTPUT"
          if [ "$status" != "PASS" ]; then exit 1; fi

  publish-summary:
    name: Publicar resumen de validación
    needs:
      - validate
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Obtener repositorio de gobernanza
        uses: actions/checkout@v4
        with:
          repository: fad3dc07-e43b-4db5-92bd-fbfecbc5ae1b/ci-architecture-governance
          path: governance

      - name: Mostrar informe consolidado
        shell: bash
        run: |
          status="$(VALIDATION_REPORT="$VALIDATION_REPORT" node governance/engine.mjs --mode summary)"
          if [ "$status" != "PASS" ]; then exit 1; fi
        env:
          VALIDATION_REPORT: ${{ needs.validate.outputs.report }}

name: Validate Archimate Source

on:
  workflow_call:
    inputs:
      source_path:
        description: Path to the source folder in the caller repository.
        required: false
        type: string
        default: "artifact/source"
    outputs:
      status:
        description: Validation status.
        value: ${{ jobs.validate.outputs.status }}
      report:
        description: Validation report as JSON.
        value: ${{ jobs.validate.outputs.report }}

jobs:
  validate:
    name: Validate archimate source
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      status: ${{ steps.validate.outputs.status }}
      report: ${{ steps.validate.outputs.report }}

    steps:
      - name: Checkout caller repository
        uses: actions/checkout@v4

      - id: validate
        name: Validate source document
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          import xml.etree.ElementTree as ET
          from pathlib import Path

          source_path = Path(os.environ["SOURCE_PATH"])
          expected_file = source_path / "design.archimate"

          def local_name(tag: str) -> str:
              if "}" in tag:
                  return tag.rsplit("}", 1)[-1]
              return tag

          def is_archimate_model(text: str) -> bool:
              return "archimate" in text.lower()

          if not source_path.exists() or not source_path.is_dir():
              report = {"path": str(source_path), "status": "FAIL", "checks": [], "observations": [f"Source folder '{source_path}' is missing or not a directory."]}
              output_path = Path(os.environ["GITHUB_OUTPUT"])
              with output_path.open("a", encoding="utf-8") as fh:
                  fh.write("status=FAIL\n")
                  fh.write("report<<EOF\n")
                  fh.write(json.dumps(report, indent=2))
                  fh.write("\nEOF\n")
              raise SystemExit(0)

          visible_files = sorted([p for p in source_path.rglob("*") if p.is_file() and not any(part.startswith(".") for part in p.parts)])
          if visible_files != [expected_file]:
              report = {"path": str(source_path), "status": "FAIL", "checks": [], "observations": [f"Expected only '{expected_file}' under '{source_path}', found: {[str(p) for p in visible_files]}."]}
              output_path = Path(os.environ["GITHUB_OUTPUT"])
              with output_path.open("a", encoding="utf-8") as fh:
                  fh.write("status=FAIL\n")
                  fh.write("report<<EOF\n")
                  fh.write(json.dumps(report, indent=2))
                  fh.write("\nEOF\n")
              raise SystemExit(0)

          fail = False
          observations = []

          text = expected_file.read_text(encoding="utf-8", errors="replace")
          if not text.strip():
              fail = True
              observations.append(f"'{expected_file}' is empty.")
          elif not is_archimate_model(text):
              fail = True
              observations.append(f"'{expected_file}' is not an acceptable ArchiMate source file.")
          else:
              try:
                  root = ET.fromstring(text)
                  root_name = local_name(root.tag)
                  if root_name != "model":
                      fail = True
                      observations.append(f"'{expected_file}' does not have an ArchiMate model root element.")
              except Exception as exc:
                  fail = True
                  observations.append(f"XML parse failed for '{expected_file}': {exc}.")

          report = {
              "path": str(source_path),
              "status": "FAIL" if fail else "PASS",
              "checks": [{"name": "design_archimate", "status": "FAIL" if fail else "PASS"}],
              "observations": observations,
          }

          output_path = Path(os.environ["GITHUB_OUTPUT"])
          with output_path.open("a", encoding="utf-8") as fh:
              fh.write(f"status={'FAIL' if fail else 'PASS'}\n")
              fh.write("report<<EOF\n")
              fh.write(json.dumps(report, indent=2))
              fh.write("\nEOF\n")
          PY
        env:
          SOURCE_PATH: ${{ inputs.source_path }}

name: Validate Repository Structure

on:
  workflow_call:
    inputs:
      repository_name_pattern:
        description: Regular expression for the caller repository name.
        required: false
        type: string
        default: "^(SBB-(SD|AM|BS)-[0-9]{4}|BS-[0-9]{4})$"
    outputs:
      status:
        description: Validation status.
        value: ${{ jobs.validate.outputs.status }}
      report:
        description: Validation report as JSON.
        value: ${{ jobs.validate.outputs.report }}

jobs:
  validate:
    name: Validate repository structure
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      status: ${{ steps.validate.outputs.status }}
      report: ${{ steps.validate.outputs.report }}

    steps:
      - name: Checkout caller repository
        uses: actions/checkout@v4

      - id: validate
        name: Validate repository structure
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          import re
          from pathlib import Path

          repo_name = os.environ["GITHUB_REPOSITORY"].split("/")[-1]
          repository_name_pattern = os.environ["REPOSITORY_NAME_PATTERN"]

          required_paths = [
              ("README.md", "file"),
              (".github/workflows/validate.yml", "file"),
              (".github/governance/design-governance-report.schema.json", "file"),
              ("artifact", "dir"),
              ("artifact/source", "dir"),
              ("artifact/exchange", "dir"),
              ("artifact/exchange/design.openexchange.xml", "file"),
          ]

          observations = []

          repo_ok = re.fullmatch(repository_name_pattern, repo_name) is not None
          if not repo_ok:
              observations.append(f"Repository name '{repo_name}' does not match '{repository_name_pattern}'.")

          checks = []
          for relative_path, expected_kind in required_paths:
              path = Path(relative_path)
              exists = path.exists()
              kind_ok = path.is_file() if expected_kind == "file" else path.is_dir()
              status = "PASS" if exists and kind_ok else "FAIL"
              checks.append({"path": relative_path, "kind": expected_kind, "status": status})
              if not (exists and kind_ok):
                  observations.append(f"Expected {expected_kind} '{relative_path}' is missing or invalid.")

          status = "PASS" if repo_ok and all(item["status"] == "PASS" for item in checks) else "FAIL"
          report = {
              "name": repo_name,
              "status": status,
              "checks": [{"name": "repository_name", "status": "PASS" if repo_ok else "FAIL"}] + checks,
              "observations": observations,
          }

          output_path = Path(os.environ["GITHUB_OUTPUT"])
          with output_path.open("a", encoding="utf-8") as fh:
              fh.write(f"status={status}\n")
              fh.write("report<<EOF\n")
              fh.write(json.dumps(report, indent=2))
              fh.write("\nEOF\n")
          PY
        env:
          REPOSITORY_NAME_PATTERN: ${{ inputs.repository_name_pattern }}
